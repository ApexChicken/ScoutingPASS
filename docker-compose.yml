services:
  app:
    build: .
    image: scoutingpass:latest
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - app
