<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --border: #1e1e1e;
      --accent: orangered;
      --text: #ffffff;
      --muted: #777777;
      --mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,69,0,0.035) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,69,0,0.035) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
    }

    .code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 600;
      line-height: 1;
      color: var(--border);
      letter-spacing: -0.05em;
    }

    .msg {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .back {
      margin-top: 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .back:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="msg">Page not found</div>
    <a class="back" href="index.html">← Return to login</a>
  </div>
</body>
</html>
