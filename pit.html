<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, maximum-scale=1.0">
  <title>Scouting PASS – Pit</title>
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="icon" sizes="16x16 32x32 64x64" href="favicon.ico">
  <script src="resources/js/easy.qrcode.min.js"></script>
  <script src="resources/js/TBAInterface.js"></script>
  <script src="resources/js/scoutingPASS.js"></script>
  <script src="2026/rebuild_pit_config.js"></script>
  <link rel="stylesheet" href="resources/css/scoutingPASS.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500&display=swap">
  <style>
    :root {
      --or: #FF5500;
      --or-glow: rgba(255,85,0,0.18);
      --bg: #0a0a0a;
      --panel: #101010;
      --panel2: #151515;
      --border: #252525;
      --text: #e0e0e0;
      --dim: #666;
      --mono: 'Share Tech Mono', monospace;
      --head: 'Barlow Condensed', sans-serif;
      --body: 'Barlow', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.035) 2px, rgba(0,0,0,0.035) 4px);
      pointer-events: none; z-index: 9000;
    }

    #oc-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      height: 58px; background: var(--panel);
      border-bottom: 2px solid var(--or);
      box-shadow: 0 2px 30px var(--or-glow);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
    }
    #oc-header .title {
      font-family: var(--head); font-weight: 900;
      font-size: 21px; letter-spacing: 4px; color: var(--or);
    }
    #oc-header .badge {
      font-family: var(--mono); font-size: 10px;
      color: var(--dim); letter-spacing: 2px;
      border: 1px solid var(--border); padding: 3px 9px; border-radius: 2px;
    }
    #oc-header .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #44aaff; box-shadow: 0 0 8px #44aaff;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    #oc-tabs {
      position: fixed; top: 58px; left: 0; right: 0; z-index: 499;
      height: 38px; background: var(--panel2);
      border-bottom: 1px solid var(--border); display: flex;
    }
    .oc-tab {
      flex: 1; background: none; border: none;
      border-right: 1px solid var(--border);
      color: var(--dim); font-family: var(--mono);
      font-size: 9px; letter-spacing: 1.5px;
      text-transform: uppercase; cursor: pointer;
      transition: color .15s, background .15s; position: relative;
    }
    .oc-tab:last-child { border-right: none; }
    .oc-tab.active { color: var(--or); background: rgba(255,85,0,0.06); }
    .oc-tab.active::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: var(--or);
    }

    #oc-progress {
      position: fixed; top: 94px; left: 0;
      height: 2px; z-index: 498;
      background: var(--or); box-shadow: 0 0 8px var(--or);
      transition: width .35s cubic-bezier(.4,0,.2,1);
    }

    #oc-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      height: 54px; background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px;
    }
    .oc-nav-btn {
      font-family: var(--head); font-weight: 700;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      padding: 9px 24px; border-radius: 2px; cursor: pointer; border: none;
    }
    #oc-prev { background: transparent; border: 1px solid var(--border) !important; color: var(--dim); }
    #oc-prev:hover { border-color: var(--or) !important; color: var(--or); }
    #oc-next { background: var(--or); color: #000; box-shadow: 0 0 18px var(--or-glow); }
    #oc-next:hover { background: #ff6820; }
    .oc-step { font-family: var(--mono); font-size: 10px; color: var(--dim); }

    .cbracket {
      position: fixed; width: 16px; height: 16px;
      pointer-events: none; z-index: 9001;
    }
    .cbracket.tl { top: 60px; left: 0; border-top: 2px solid var(--or); border-left: 2px solid var(--or); }
    .cbracket.tr { top: 60px; right: 0; border-top: 2px solid var(--or); border-right: 2px solid var(--or); }
    .cbracket.bl { bottom: 56px; left: 0; border-bottom: 2px solid var(--or); border-left: 2px solid var(--or); }
    .cbracket.br { bottom: 56px; right: 0; border-bottom: 2px solid var(--or); border-right: 2px solid var(--or); }

    /* CRITICAL: Never set display on .main-panel */
    .main-panel {
      background-color: var(--bg) !important;
      padding-top: 100px !important;
      padding-left: 14px !important;
      padding-right: 14px !important;
      padding-bottom: 70px !important;
      min-height: 100vh !important;
    }
    .main-panel > h1, .main-panel > h2 { display: none !important; }
    .match-label { display: none !important; }

    .oc-section {
      font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
      color: var(--or); text-transform: uppercase;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .oc-section::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, var(--or), transparent);
    }

    #prematch_table {
      width: 100% !important; border: none !important;
      background: transparent !important; border-collapse: collapse !important;
    }
    #prematch_table tr { border-bottom: 1px solid var(--border) !important; }
    #prematch_table td { color: var(--text) !important; padding: 9px 6px !important; vertical-align: middle !important; }
    .title { font-family: var(--body) !important; font-size: 13px !important; color: var(--dim) !important; text-align: right !important; padding-right: 12px !important; }
    .field { text-align: left !important; }

    input[type="text"], input[type="number"], textarea, select {
      font-family: var(--mono) !important; font-size: 14px !important;
      background: #181818 !important; color: var(--text) !important;
      border: 1px solid var(--border) !important; border-radius: 3px !important;
      padding: 7px 9px !important; outline: none !important;
    }
    input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
      border-color: var(--or) !important; box-shadow: 0 0 0 2px var(--or-glow) !important;
    }
    input[type="radio"], input[type="checkbox"] { accent-color: var(--or) !important; width: 15px !important; height: 15px !important; }
    label { font-family: var(--body) !important; font-size: 13px !important; color: var(--text) !important; }

    input[type="button"]:not([id^="nextButton"]):not([id^="prevButton"]):not(#displayButton):not(#copyButton) {
      background: var(--panel2) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; font-family: var(--mono) !important;
      font-size: 13px !important; border-radius: 3px !important;
      padding: 6px 13px !important; cursor: pointer !important;
    }

    #qr-code { background: var(--bg) !important; color: var(--text) !important; text-align: center !important; }
    .oc-qr-title { font-family: var(--mono); font-size: 9px; letter-spacing: 3px; color: var(--or); text-transform: uppercase; margin: 18px 0 10px; }
    #submitButton, #clearButton { margin: 10px auto; max-width: 320px; }
    .submitForm { font-family: var(--head) !important; font-weight: 700 !important; font-size: 15px !important; letter-spacing: 2px !important; text-transform: uppercase !important; padding: 14px !important; border-radius: 3px !important; background: var(--or) !important; color: #000 !important; border: none !important; width: 100% !important; cursor: pointer !important; box-shadow: 0 0 20px var(--or-glow) !important; }
    .clearForm { font-family: var(--head) !important; font-size: 14px !important; letter-spacing: 2px !important; text-transform: uppercase !important; padding: 11px !important; border-radius: 3px !important; background: transparent !important; color: var(--dim) !important; border: 1px solid #333 !important; width: 100% !important; cursor: pointer !important; }
    #displayButton, #copyButton { font-family: var(--head) !important; font-size: 12px !important; font-weight: 600 !important; letter-spacing: 1px !important; text-transform: uppercase !important; padding: 9px 18px !important; background: var(--panel2) !important; border: 1px solid var(--border) !important; color: var(--dim) !important; border-radius: 3px !important; margin: 4px !important; cursor: pointer !important; }
    #qrcode { display: inline-block !important; padding: 12px !important; background: #fff !important; border-radius: 4px !important; margin: 12px auto !important; }
    #qr-table { background: transparent !important; border: none !important; }
    #qr-table td { background: transparent !important; color: var(--dim) !important; border: none !important; }
    #data { font-family: var(--mono) !important; font-size: 10px !important; color: var(--dim) !important; word-break: break-all !important; background: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 3px !important; padding: 10px !important; text-align: left !important; }
    #export-status { font-family: var(--mono) !important; color: var(--or) !important; min-height: 22px !important; }
  </style>
</head>
<body>

<div id="oc-header">
  <span class="title">Orange Chaos 4564</span>
  <span class="badge">PIT SCOUTING // 2026</span>
  <span class="dot"></span>
</div>

<div id="oc-tabs">
  <button class="oc-tab active" onclick="ocTab(0)">PIT DATA</button>
  <button class="oc-tab" onclick="ocTab(1)">EXPORT</button>
</div>

<div id="oc-progress" style="width:50%"></div>

<div class="cbracket tl"></div><div class="cbracket tr"></div>
<div class="cbracket bl"></div><div class="cbracket br"></div>

<form id="scoutingForm" onsubmit="return false">
  <div id="main-panel-holder">

    <div id="prematch" class="main-panel">
      <h1 id="prematchHeader1" class="page_title"><span class="odd">P</span><span class="even">W</span><span class="odd">N</span><span class="even">A</span><span class="odd">G</span><span class="even">E</span><br>Scouting 2020</h1>
      <h2 id="prematchHeader2">Pit Scouting</h2>
      <p class="match-label"><input type="button" value="Next" id="nextButton1" onclick="swipePage(1)"></p>
      <div class="oc-section">Robot Intel</div>
      <table id="prematch_table" style="font:Roboto"><!-- ###PRE-MATCH-COMPONENTS###--></table>
      <p class="match-label"><input type="button" value="Next" id="nextButton2" onclick="swipePage(1)"></p>
    </div>

    <div id="qr-code" class="main-panel">
      <h1 id="qrHeader1" class="page_title"><span class="odd">P</span><span class="even">W</span><span class="odd">n</span><span class="even">A</span><span class="odd">G</span><span class="even">E</span><br>Scouting 2020</h1>
      <h2 id="qrHeader2">Generate Export File</h2>
      <p class="match-label"><input type="button" value="Prev" id="prevButton9" onclick="swipePage(-1)"></p>
      <div class="oc-qr-title">Export</div>
      <p id="export-info"><span id="display_export-info" style="border:none;text-align:center;"></span></p>
      <div id="submitButton">
        <button id="exportButton" type="button" class="submitForm" onclick="generateExportFile()">Generate Export File</button>
      </div>
      <p id="export-status" style="text-align:center"></p>
      <div class="oc-qr-title">Backup QR Code</div>
      <p id="qr-info"><span id="display_qr-info" style="border:none;text-align:center;"></span></p>
      <table id="qr-table"><tr><td width="5%">&nbsp;</td><td width="90%">
        <div id="qrcode" style="text-align:center">
          <script>qr = new QRCode(document.getElementById("qrcode"), options)</script>
        </div>
      </td><td width="5%">&nbsp;</td></tr>
      <tr><td width="5%">&nbsp;</td><td width="90%">
        <div><p id="data" style="text-align:center"></p></div>
      </td><td width="5%">&nbsp;</td></tr></table>
      <p style="text-align:center;margin-top:12px;">
        <input type="button" value="Display Data" id="displayButton" onclick="displayData()">
        <input type="button" value="Copy Data" id="copyButton" onclick="copyData()">
      </p>
      <div id="clearButton">
        <button type="button" class="clearForm" onclick="clearForm()">Clear Form</button>
      </div><br>
    </div>

  </div>
</form>

<div id="oc-nav">
  <button class="oc-nav-btn" id="oc-prev" onclick="ocStep(-1)" style="visibility:hidden">← Prev</button>
  <span class="oc-step" id="oc-step">01 / 02</span>
  <button class="oc-nav-btn" id="oc-next" onclick="ocStep(1)">Next →</button>
</div>

<script>
  var ocCurrent = 0;
  var ocPanels = ['prematch','qr-code'];

  function ocTab(idx) {
    ocCurrent = idx;
    document.querySelectorAll('.oc-tab').forEach(function(t,i){ t.classList.toggle('active', i===idx); });
    document.getElementById('oc-step').textContent = String(idx+1).padStart(2,'0')+' / 02';
    document.getElementById('oc-progress').style.width = ((idx+1)/2*100)+'%';
    document.getElementById('oc-prev').style.visibility = idx===0 ? 'hidden' : 'visible';
    document.getElementById('oc-next').textContent = idx===1 ? 'Done' : 'Next →';
  }

  function ocStep(dir) {
    var next = ocCurrent + dir;
    if (next >= 0 && next < 2) {
      ocTab(next);
      if (typeof swipePage === 'function') swipePage(dir);
    }
  }

  window.addEventListener('load', function() {
    var obs = new MutationObserver(function() {
      ocPanels.forEach(function(id, i) {
        var el = document.getElementById(id);
        if (el && el.style.display && el.style.display !== 'none' && ocCurrent !== i) ocTab(i);
      });
    });
    ocPanels.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) obs.observe(el, {attributes:true, attributeFilter:['style']});
    });
  });
</script>

</body>
</html>
